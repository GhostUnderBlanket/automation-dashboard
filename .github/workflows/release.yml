name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend deps
        run: npm ci

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build

      - name: Create updater bundles and latest.json
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          Add-Type -AssemblyName System.IO.Compression.FileSystem

          function New-StoredZip($sourcePath, $destZip) {
            if (Test-Path $destZip) { Remove-Item $destZip -Force }
            $zip = [System.IO.Compression.ZipFile]::Open($destZip, [System.IO.Compression.ZipArchiveMode]::Create)
            [void][System.IO.Compression.ZipFileExtensions]::CreateEntryFromFile(
              $zip,
              $sourcePath,
              [System.IO.Path]::GetFileName($sourcePath),
              [System.IO.Compression.CompressionLevel]::NoCompression
            )
            $zip.Dispose()
          }

          $tag   = "${{ github.ref_name }}"
          $owner = "${{ github.repository_owner }}"
          $repo  = "${{ github.event.repository.name }}"
          $base  = "https://github.com/$owner/$repo/releases/download/$tag"

          # NSIS update bundle (STORED zip — Tauri updater requires no compression)
          $nsisExe = Get-ChildItem "src-tauri/target/release/bundle/nsis" -Filter "*-setup.exe" -File | Select-Object -First 1
          $nsisZip = Join-Path $nsisExe.DirectoryName "$($nsisExe.BaseName).nsis.zip"
          Write-Host "Packing (STORED) $($nsisExe.Name)"
          New-StoredZip $nsisExe.FullName $nsisZip
          npx tauri signer sign -p "$env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD" "$nsisZip"
          if (-not (Test-Path "$nsisZip.sig")) { throw "NSIS zip signing failed" }
          $nsisSig = (Get-Content "$nsisZip.sig" -Raw).Trim()

          # MSI update bundle (STORED zip)
          $msiFile = Get-ChildItem "src-tauri/target/release/bundle/msi" -Filter "*.msi" -File | Select-Object -First 1
          $msiZip  = Join-Path $msiFile.DirectoryName "$($msiFile.BaseName).msi.zip"
          Write-Host "Packing (STORED) $($msiFile.Name)"
          New-StoredZip $msiFile.FullName $msiZip
          npx tauri signer sign -p "$env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD" "$msiZip"
          if (-not (Test-Path "$msiZip.sig")) { throw "MSI zip signing failed" }

          # latest.json
          $version = $tag.TrimStart('v')
          $manifest = [ordered]@{
            version   = $version
            notes     = "See the release page for changes."
            pub_date  = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{
                signature = $nsisSig
                url       = "$base/$([System.IO.Path]::GetFileName($nsisZip))"
              }
            }
          }
          $out = "src-tauri/target/release/bundle/latest.json"
          $manifest | ConvertTo-Json -Depth 6 | Set-Content -Path $out -Encoding utf8
          Write-Host "=== latest.json ==="; Get-Content $out

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Autoflow ${{ github.ref_name }}
          body: |
            ## Install

            Download `Autoflow_*_x64-setup.exe` (recommended) or `Autoflow_*_x64_en-US.msi`.

            ## Auto-update

            Existing installations will pick this up automatically via the in-app update checker.
          draft: false
          prerelease: false
          files: |
            src-tauri/target/release/bundle/nsis/*-setup.exe
            src-tauri/target/release/bundle/nsis/*-setup.exe.sig
            src-tauri/target/release/bundle/nsis/*.nsis.zip
            src-tauri/target/release/bundle/nsis/*.nsis.zip.sig
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/msi/*.msi.sig
            src-tauri/target/release/bundle/msi/*.msi.zip
            src-tauri/target/release/bundle/msi/*.msi.zip.sig
            src-tauri/target/release/bundle/latest.json
